<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">

    <div class="grid gap-4 md:grid-cols-12">

        <div class="md:col-span-5">
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                Search Fields
            </label>

            <div class="grid grid-cols-2 gap-2">

                <input type="text" placeholder="Search by name..." class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white" />

                <input type="text" placeholder="Email or Phone..." class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white" />

            </div>
        </div>

        <div class="md:col-span-3">
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                Account Status
            </label>

            <select class="w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white">

                <option>All Statuses</option>
                <option>Active Only</option>
                <option>Inactive Only</option>

            </select>
        </div>

        <div class="md:col-span-4">

            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">
                Sort Matrix
            </label>

            <div class="flex gap-2">

                <select class="flex-1 rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white">

                    <option>Newest Registered</option>
                    <option>Orders (High → Low)</option>
                    <option>Spending (High → Low)</option>

                </select>

                <button class="rounded-lg border border-slate-200 bg-slate-100 px-3 transition hover:bg-slate-200">

                    <i class="fa-solid fa-rotate-left"></i>

                </button>

            </div>

        </div>

    </div>

</section>
